

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevaLink Dashboard</title>
    <link rel="stylesheet" href="ngo_dashboad_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
 <script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai@0.11.4"
  }
}
</script>
</head>
<body>
    <script type="module" src="ngo_dashboad_script.js"></script>

    <header>
        <div class="logo-container">
            <img src="./IMAGE/SevaLink.png" alt="SevaLink" class="brand-logo">
            <span class="brand-name">SevaLink</span>
        </div>
        <div class="header-right">
            <span>Welcome, <strong>NGO Admin</strong></span>
            <a href="reg-ngo.html"><button class="btn-get-started">Get Started</button></a>
            <div class="avatar">👤</div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="nav-item active">📊 Dashboard</div>
            <div class="nav-item" id="postNeedBtn">📢 Post Need</div>
            <a href="activity_ngo.html" class="nav-item">📋 My Requests</a>
        </aside>

        <main class="content">
            <h1 class="page-title">Dashboard Overview</h1>

            <div class="ai-card">
                <div class="ai-header">
                    <span class="ai-sparkle">✨</span>
                    <h3>Gemini AI Smart Post</h3>
                </div>
                <p class="ai-instruction">Describe your need in one sentence, and AI will handle the rest!</p>
                <textarea id="missionInput" class="ai-textarea" placeholder="Example: Need 10 people for clothes donation..."></textarea>
                <button id="aiBtn" class="btn-ai">Generate Smart Title</button>
                <div id="resultBox"></div>
            </div>
            
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon green">📢</div>
                    <div>
                        <p class="stat-label">Active Requests</p>
                        <h2 id="activeCount">2</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">👥</div>
                    <div>
                        <p class="stat-label">Volunteers Applied</p>
                        <h2>85</h2>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <h3>Recent Needs</h3>
                <div id="needsList"></div>
            </div>
        </main>
    </div>

    <script type="module" src="ngo_dashboad_script.js"></script>
</body>
</html>
